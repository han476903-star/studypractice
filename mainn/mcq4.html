<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz 84-101</title>

    <style>
      body {
        font-family: Arial, sans-serif;
        background: #f4f7fb;
        padding: 30px;
      }
      .quiz {
        max-width: 900px;
        margin: auto;
      }
      .question {
        background: white;
        padding: 18px;
        margin-bottom: 20px;
        border-radius: 10px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }
      button {
        display: block;
        width: 100%;
        text-align: left;
        margin: 8px 0;
        padding: 10px;
        border: none;
        border-radius: 6px;
        background: #ececec;
        cursor: pointer;
        font-size: 15px;
      }
      button:hover {
        background: #d8e9ff;
      }
      .correct {
        background: #9be79b !important;
      }
      .wrong {
        background: #ff9d9d !important;
      }
      .result {
        font-weight: bold;
        margin-top: 10px;
      }
    </style>
  </head>
  <body>
    <div class="quiz" id="quiz"></div>

    <script>
      const questions = [
        {
          q: "84. A new __________ of programs on wildlife will be shown on Channel 4 in the autumn.",
          a: ["episode", "series", "serial", "sequel"],
          correct: 1,
        },

        {
          q: "85. As I boarded the train, I was suddenly __________ by the arm and ushered towards a first-class carriage.",
          a: ["clutched", "grabbed", "caught", "plucked"],
          correct: 1,
        },

        {
          q: "86. There has been a lot of __________ surrounding the government's proposed scheme.",
          a: ["controversy", "consent", "conformity", "consequence"],
          correct: 0,
        },

        {
          q: "87. The local authorities need to __________ down on illegal parking.",
          a: ["hit", "move", "force", "crack"],
          correct: 3,
        },

        {
          q: "88. My uncle pulled a few __________ and got me a job.",
          a: ["ropes", "strings", "threads", "chords"],
          correct: 1,
        },

        {
          q: "89. If I didn't have to work tonight, __________",
          a: [
            "I'd be able to relax now",
            "I am able to relax now",
            "I'll be able to relax now",
            "I would have been able to relax",
          ],
          correct: 0,
        },

        {
          q: "90. The one person most responsible for making New York City a center of furniture design... __________ cabinetmaker Duncan Phyfe.",
          a: [
            "was the hardworking",
            "through his hard work",
            "he was hardworking",
            "by working hard, the",
          ],
          correct: 0,
        },

        {
          q: "91. __________ a language family is a group of languages with a common origin...",
          a: [
            "What linguists call",
            "It is called by linguists",
            "Linguists call it",
            "What do linguists call",
          ],
          correct: 0,
        },

        {
          q: "92. __________ because of the complexity of his writing...",
          a: ["It may be", "Perhaps", "Besides", "Why is it"],
          correct: 1,
        },

        {
          q: "93. First performed in 1976, __________",
          a: [
            "William Lane wrote...",
            "the life of Emily Dickinson was...",
            "William Lane's one-character play The Belle of Amherst was...",
            "there was only one character...",
          ],
          correct: 2,
        },

        {
          q: "94. Two dead bodies were __________ from the wreckage.",
          a: ["recovered", "saved", "salvaged", "liberated"],
          correct: 0,
        },

        {
          q: "95. He was not __________ to taking on all the extra responsibilities.",
          a: ["hesitant", "unenthusiastic", "reluctant", "averse"],
          correct: 3,
        },

        {
          q: "96. The Red Cross is __________ an international aid organization.",
          a: ["intriguingly", "intrusively", "intrinsically", "intrepidly"],
          correct: 2,
        },

        {
          q: "97. The quality papers are a different __________ of fish from the gutter press.",
          a: ["pan", "basket", "box", "kettle"],
          correct: 3,
        },

        {
          q: "98. As a result of __________, the price of new cars has risen dramatically.",
          a: ["Inflation", "escalation", "distension", "extension"],
          correct: 0,
        },

        {
          q: "99. __________ types of insects that pollinate plants.",
          a: [
            "Not only are the bees",
            "Bees are not the only",
            "Not the only bees are",
            "Bees are not only the",
          ],
          correct: 1,
        },

        {
          q: "100. The geographic position of North America, __________ in the early days...",
          a: [
            "laying..., isolating it",
            "isolating it as it lay...",
            "lying..., isolated it",
            "isolating it... as it lied",
          ],
          correct: 1,
        },

        {
          q: "101. Not until the Triassic Period __________.",
          a: [
            "that the first primitive mammals did develop",
            "did the first primitive mammals develop",
            "did develop the first primitive mammals",
            "the first primitive mammals developed",
          ],
          correct: 1,
        },
      ];

      const letters = ["A", "B", "C", "D"];

      const quiz = document.getElementById("quiz");

      questions.forEach((item, index) => {
        let div = document.createElement("div");
        div.className = "question";

        let html = `<h3>${item.q}</h3>`;

        item.a.forEach((choice, i) => {
          html += `<button onclick="check(this,${index},${i})">${letters[i]}. ${choice}</button>`;
        });

        html += `<div class="result" id="r${index}"></div>`;

        div.innerHTML = html;

        quiz.appendChild(div);
      });

      function check(btn, q, a) {
        const question = document.getElementsByClassName("question")[q];

        const buttons = question.getElementsByTagName("button");

        for (let b of buttons) b.disabled = true;

        if (a === questions[q].correct) {
          btn.classList.add("correct");

          document.getElementById("r" + q).innerHTML = "✅ Correct!";
        } else {
          btn.classList.add("wrong");

          buttons[questions[q].correct].classList.add("correct");

          document.getElementById("r" + q).innerHTML =
            "❌ Wrong! Correct answer: " + letters[questions[q].correct];
        }
      }
    </script>
  </body>
</html>
