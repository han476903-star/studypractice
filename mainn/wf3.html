<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Word Formation Practice</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        max-width: 1000px;
        margin: auto;
        padding: 30px;
        background: #f4f6f9;
      }
      h1 {
        text-align: center;
      }
      .question {
        background: white;
        padding: 15px;
        margin: 15px 0;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      }
      input {
        width: 250px;
        padding: 8px;
        font-size: 16px;
      }
      .correct {
        color: green;
        font-weight: bold;
      }
      .wrong {
        color: red;
        font-weight: bold;
      }
      button {
        padding: 12px 30px;
        font-size: 18px;
        cursor: pointer;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 8px;
      }
      button:hover {
        background: #0056b3;
      }
      #score {
        font-size: 24px;
        text-align: center;
        margin-top: 30px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <h1>Word Formation Practice</h1>

    <div id="quiz"></div>

    <div style="text-align: center; margin-top: 30px">
      <button onclick="check()">Check Answers</button>
    </div>

    <div id="score"></div>

    <script>
      const questions = [
        [
          "Liskeard and Callington are basically _______ from here, so it’ll take about the same time to get to either of them. (DISTANT)",
          "equidistant",
        ],

        ["The bride was _______ dressed in white. (STYLE)", "stylishly"],

        [
          "His methodical _______ was a point of divergence from the Impressionists and he devoted many studies to creating the composition. (PAIN)",
          "painstakingness",
        ],

        [
          "It’s _______ when people won’t believe things that are obviously true. (FURY)",
          "infuriating",
        ],

        [
          "_______ of East and West Germany began when the Berlin Wall came down. (UNITY)",
          "reunification",
        ],

        [
          "In Scotland, there is greater emphasis on _______ by individual schools. (VALUE)",
          "values",
        ],

        [
          "Eighty percent of people interviewed _______ declared that the use of endangered wild animals should be prohibited. (VOICE)",
          "voiced",
        ],

        [
          "Don’t believe what they said. I think they are _______ witnesses. (TRUST)",
          "untrustworthy",
        ],

        [
          "British Prime Minister Margaret Thatcher called the hanging an act of _______. (BARBARIC)",
          "barbarity",
        ],

        [
          "Don’t judge the matter by my opponent’s _______ statement. (LATERAL)",
          "unilateral",
        ],

        [
          "In my opinion, this book is just _______ rubbish. (INTELLECT)",
          "intellectual",
        ],

        [
          "Jim is one of the most _______ members of the committee. (SPEAK)",
          "outspoken",
        ],

        ["She found the idea deeply _______. (REPEL)", "repellent"],

        [
          "He was discovered to have been _______ company funds. (PROPERTY)",
          "misappropriating",
        ],

        [
          "If you can respond calmly and _______ then I think that would be the best way forward. (AGGRESSIVE)",
          "non-aggressively",
        ],

        [
          "Most of the errors were corrected at the _______ stage before the copies were finally printed. (READ)",
          "proofreading",
        ],

        [
          "The other team completely _______ us and we lost 6-0. (PLAY)",
          "outplayed",
        ],

        [
          "Some species feed primarily on fruit and so aid in seed _______. (DISPERSE)",
          "dispersal",
        ],

        [
          "Any actor who becomes known for one role is in danger of becoming _______. (TYPE)",
          "typecast",
        ],

        [
          "If the cabin _______, oxygen masks will automatically drop down. (PRESS)",
          "depressurizes",
        ],

        [
          "The museum’s collection includes _______ dating back to prehistoric times. (FACT)",
          "artefacts|artifacts",
        ],

        [
          "You won’t persuade him to change his mind. His decision is _______. (REVOKE)",
          "irrevocable",
        ],

        [
          "They were divorced because there was nothing she could do to make her husband change. He was such a _______ flirt.",
          "incorrigible",
        ],

        [
          "The slight _______ in his left hand was corrected by surgery. (FORM)",
          "deformity",
        ],

        [
          "You and he were so close about the project; it was an _______ obsession of his. (PERVADE)",
          "all-pervading",
        ],

        [
          "The candidate made an _______ speech that incensed all those who heard it. (FLAME)",
          "inflammatory",
        ],

        [
          "These shoes are very nice, but they are terribly _______. (PRICE)",
          "overpriced",
        ],

        [
          "It was _______ of him to leave the children on their own in the pool. (RESPONSE)",
          "irresponsible",
        ],

        [
          "He refused to say anything on the grounds that he might _______ himself. (CRIME)",
          "incriminate",
        ],
      ];

      const quiz = document.getElementById("quiz");

      questions.forEach((q, i) => {
        quiz.innerHTML += `
<div class="question">
<p><b>${i + 1}.</b> ${q[0]}</p>
<input id="q${i}">
<div id="r${i}"></div>
</div>
`;
      });

      function check() {
        let score = 0;

        questions.forEach((q, i) => {
          let ans = document
            .getElementById("q" + i)
            .value.trim()
            .toLowerCase();

          let acceptable = q[1].split("|");

          let correct = acceptable.includes(ans);

          let result = document.getElementById("r" + i);

          if (correct) {
            score++;

            result.innerHTML = "<span class='correct'>✔ Correct</span>";
          } else {
            result.innerHTML =
              "<span class='wrong'>✘ Wrong</span><br>Correct answer: <b>" +
              acceptable[0] +
              "</b>";
          }
        });

        document.getElementById("score").innerHTML =
          "Score: <b>" + score + " / " + questions.length + "</b>";
      }
    </script>
  </body>
</html>
